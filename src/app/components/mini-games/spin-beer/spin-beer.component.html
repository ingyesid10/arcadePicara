<div class="dice-container">
  <!-- 🔗 Enlace para abrir reglas -->
  <div class="rules-link">
    <a href="javascript:void(0)" (click)="openRulesModal()" class="rules-btn">
      📋 {{ labels.VIEW_RULES }}
    </a>
  </div>

  <!-- 🎯 Zona de los dados -->
  <div class="dice-stage">
    <div class="die" [ngClass]="{'spin': spinning}">
      <img [src]="leftDieImage" [alt]="'Left die: ' + leftDieValue" class="die-image">
    </div>
    <div class="die" [ngClass]="{'spin': spinning}">
      <img [src]="rightDieImage" [alt]="'Right die: ' + rightDieValue" class="die-image">
    </div>
  </div>

  <!-- 🎮 Botón para lanzar los dados -->
  <div class="actions-center">
    <button class="btn-yellow" (click)="startSpin()" [disabled]="spinning">
      🎲 {{ spinning ? labels.ROLLING : labels.ROLL }}
    </button>
  </div>

  <!-- 💥 Resultado del lanzamiento -->
  <div *ngIf="showResult" class="combination-card">
    <div class="info-section">
      <h2>{{ resultName }}</h2>
      <p>{{ resultDesc }}</p>

      <div class="actions">
        <button class="btn-yellow" (click)="startSpin()">{{ labels.ROLL_AGAIN }}</button>
      </div>
    </div>
  </div>

  <!-- 📋 Modal de Reglas -->
  <div *ngIf="showRulesModal" class="modal-overlay" (click)="closeRulesModal()">
    <div class="modal-card animate-modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>📋 {{ labels.RULES_TITLE }}</h2>
        <button class="close-btn" (click)="closeRulesModal()">×</button>
      </div>

      <div class="modal-content">
        <div class="rules-list">
          <div *ngFor="let rule of rulesList" class="rule-item">
            <span class="rule-value">{{ rule.value }}</span>
            <span class="rule-description">{{ rule.description }}</span>
          </div>
        </div>

        <div class="modal-footer">
          <button class="btn-yellow" (click)="closeRulesModal()">{{ labels.UNDERSTOOD }}</button>
        </div>
      </div>
    </div>
  </div>
</div>
