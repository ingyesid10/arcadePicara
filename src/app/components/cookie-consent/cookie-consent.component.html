<div *ngIf="showBanner" class="cookie-banner">
  <p>
    Usamos cookies para personalizar contenido y anuncios, ofrecer funciones de redes sociales
    y analizar el tráfico. Puedes aceptar o rechazar el uso de cookies.
  </p>
  <div class="buttons">
    <button (click)="acceptCookies()">Aceptar</button>
    <button (click)="rejectCookies()">Rechazar</button>
  </div>
</div>
